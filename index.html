<!DOCTYPE html>
<html>
<head>
    <title>Movie App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

<h1>🎬 Movie Recommendation</h1>

<div id="loginForm">

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="googleLogin()">Google Login</button>

<p onclick="showSignup()">Sign Up</p>

</div>

<div id="signupForm" style="display:none;">

<input id="name" placeholder="Name">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" placeholder="Password">
<input id="confirmPassword" placeholder="Confirm Password">

<button onclick="signup()">Create Account</button>

<p onclick="showLogin()">Back to Login</p>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
