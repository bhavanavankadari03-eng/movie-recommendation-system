<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Recommendation App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">

  <div class="login-box">
    <h1>🎬 Movie App Login</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="link" onclick="forgotPassword()">Forgot Password?</p>

    <button class="google-btn" onclick="googleLogin()">
      Login with Google
    </button>
  </div>

</div>

<!-- MAIN APP -->
<div id="appPage" class="page">

  <!-- LANGUAGE SELECT -->
  <div class="top-bar">
    <button onclick="selectLang('Telugu')">Telugu</button>
    <button onclick="selectLang('Hindi')">Hindi</button>
    <button onclick="selectLang('English')">English</button>
    <button onclick="selectLang('Tamil')">Tamil</button>
    <button onclick="selectLang('Malayalam')">Malayalam</button>
  </div>

  <!-- TYPE SELECT -->
  <div id="typeSection" class="section">
    <h2>Select Movie Type</h2>

    <button onclick="selectType('Action')">Action</button>
    <button onclick="selectType('Romance')">Romance</button>
    <button onclick="selectType('Comedy')">Comedy</button>
    <button onclick="selectType('Drama')">Drama</button>
    <button onclick="selectType('Sci-Fi')">Sci-Fi</button>
  </div>

  <!-- MOVIES -->
  <div id="moviesSection" class="section">
    <h2>Recommended Movies</h2>
    <div id="movies"></div>
  </div>

  <!-- RATING -->
  <div id="ratingSection" class="section">
    <h2>Rate Movie</h2>
    <p id="selectedMovie"></p>

    <select id="rating">
      <option value="1">1 ⭐</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐</option>
      <option value="4">4 ⭐</option>
      <option value="5">5 ⭐</option>
    </select>

    <button onclick="submitRating()">Submit Rating</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
