<!DOCTYPE html>
<html>
<head>
    <title>Select Language</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-container">

    <h1>🌍 Select Your Preferred Language</h1>

    <div class="language-grid">

        <button onclick="selectLanguage('Telugu')">
            Telugu
        </button>

        <button onclick="selectLanguage('Hindi')">
            Hindi
        </button>

        <button onclick="selectLanguage('English')">
            English
        </button>

        <button onclick="selectLanguage('Tamil')">
            Tamil
        </button>

        <button onclick="selectLanguage('Malayalam')">
            Malayalam
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
